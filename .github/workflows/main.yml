name: TryHackMe CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare System (Chrome & Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb libosmesa6

      - name: Run Pytest
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_LOGIN: ${{ secrets.TEST_LOGIN }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          AUTH_COOKIE: ${{ secrets.AUTH_COOKIE }}
          INVALID_TEST_LOGIN: ${{ secrets.INVALID_TEST_LOGIN }}
          INVALID_TEST_PASSWORD: ${{ secrets.INVALID_TEST_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest alex_talako/pom_site/test/api/ --alluredir=allure-results | tee api_res.txt || true
          xvfb-run --auto-servernum pytest alex_talako/pom_site/test/ui/ --alluredir=allure-results | tee ui_res.txt || true
          
          API_RES=$(grep -E 'passed|failed|error' api_res.txt | tail -n 1 | sed 's/[=]//g' | xargs)
          UI_RES=$(grep -E 'passed|failed|error' ui_res.txt | tail -n 1 | sed 's/[=]//g' | xargs)
          
          echo "API_STOUT=${API_RES:-No API results}" >> $GITHUB_ENV
          echo "UI_STOUT=${UI_RES:-No UI results}" >> $GITHUB_ENV
        continue-on-error: true

      - name: Save Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 1

      - name: Notify Telegram
        if: always()
        run: |
            curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
              -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -d text="<b>SENTINEL CI Status</b>%0A%0A<b>API Tests:</b> ${{ env.API_STOUT }}%0A<b>UI Tests:</b> ${{ env.UI_STOUT }}%0A%0A<b>Artifacts:</b> <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts'>Download Results</a>%0A<b>Details:</b> <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Run</a>" \
              -d parse_mode="HTML"
